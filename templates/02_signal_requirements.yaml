# Organizational Schema Theory -- Module 2: Signal Requirements Output Template
# Version: 1.0 (L1 -- Signal Architecture)
#
# This template structures the output of a signal architecture analysis.
# AI should fill this structure when running Module 2.
#
# Frameworks referenced:
#   - Spectral Brand Theory, SBT (Zharnikov, 2026a) -- 8 perceptual dimensions
#   - Service Design (Stickdorn et al., 2018) -- touchpoint mapping
#   - Organizational Schema Theory, OST (Zharnikov, 2026b) -- TDD cascade L0-L5
#
# Upstream dependency:
#   - Module 1 output (experience_contracts.yaml) provides L0 contract IDs
#   - Every signal must link to at least one L0 contract via satisfies_experience

business:
  name: "Spectra Coffee"                    # Business being specified
  category: "Specialty coffee shop"         # Industry/category
  analysis_date: "2026-03-08"

# --- Signal Requirements ---
# Each signal activates one of the 8 SBT dimensions.
# Dimensions: semiotic | narrative | ideological | experiential |
#             social | economic | cultural | temporal
# Emission types: designed (intentional) | ambient (environment-generated)

signal_requirements:
  - id: L1_craft_preparation               # Pattern: L1_descriptive_name
    dimension: experiential                 # One of 8 SBT dimensions
    emission_type: designed                 # designed | ambient
    satisfies_experience:                   # Links to L0 contract IDs (required)
      - L0_product_excellence
    description: >
      Customer can observe grinding, dosing, and extraction.
      The craft is visible, not hidden behind a wall.
    proxy: "Espresso machine and grinder positioned within customer sight line"

  - id: L1_origin_storytelling
    dimension: narrative
    emission_type: designed
    satisfies_experience:
      - L0_ethical_sourcing
    description: >
      Each coffee's origin, farm, and trade relationship is
      communicated at point of sale via origin cards or menu notes.
    proxy: "Origin card present for every coffee on the menu"

  - id: L1_eu_compliance_display
    dimension: semiotic
    emission_type: designed
    satisfies_experience:
      - L0_food_safety_compliance
    description: >
      Allergen information, hygiene rating, and regulatory notices
      displayed visibly at entrance and counter.
    proxy: "Compliance signage present and current at entrance and counter"

  - id: L1_warm_greeting
    dimension: social
    emission_type: designed
    satisfies_experience:
      - L0_welcoming_atmosphere
    description: >
      Every customer receives a verbal greeting within 5 seconds
      of entering. Staff makes eye contact and uses a spoken welcome.
    proxy: "Staff acknowledges each customer with eye contact and spoken welcome"

  - id: L1_coffee_aroma
    dimension: experiential
    emission_type: ambient
    satisfies_experience:
      - L0_product_excellence
      - L0_welcoming_atmosphere
    description: >
      Fresh-ground coffee aroma fills the space. An ambient signal
      of quality and warmth generated by on-site grinding.
    proxy: "Grinding happens on-site during service hours; no sealed preparation area"

  # Add signals for remaining dimensions as appropriate.
  # Aim for at least one signal per L0 contract.
  # Flag any signal that does not trace to an L0 contract as orphan.

# --- Dimension Coverage ---
# How many signals activate each SBT dimension.
# Gaps here suggest the business is under-emitting on certain perceptual channels.

dimension_coverage:
  - dimension: semiotic
    signal_count: 1
  - dimension: narrative
    signal_count: 1
  - dimension: ideological
    signal_count: 0
    gap_note: "No signal addresses ideological dimension -- consider values display or ethical stance"
  - dimension: experiential
    signal_count: 2
  - dimension: social
    signal_count: 1
  - dimension: economic
    signal_count: 0
    gap_note: "No signal addresses economic dimension -- consider price transparency or value framing"
  - dimension: cultural
    signal_count: 0
    gap_note: "No signal addresses cultural dimension -- consider local adaptation or aesthetic code"
  - dimension: temporal
    signal_count: 0
    gap_note: "No signal addresses temporal dimension -- consider founding story or seasonal rotation"

# --- Traceability ---
# Validates that every L0 contract has at least one signal,
# and that no signals are orphaned (unlinked to any contract).

traceability:
  uncovered_contracts: []                   # L0 IDs with zero signals (should be empty)
  orphan_signals: []                        # L1 IDs not linked to any L0 contract (should be empty)

# --- Emission Balance ---
# Ratio of designed vs ambient signals.
# High designed ratio = more control. High ambient ratio = more authenticity risk.

emission_balance:
  designed: 80                              # Percentage of total signals
  ambient: 20
  _total: 100                               # Validation: must equal 100
